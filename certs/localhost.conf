[req]
default_bits = 2048
prompt = no
default_md = sha256
distinguished_name = dn
req_extensions = v3_req

[dn]
CN = localhost
emailAddress = admin@localhost
O = Changfu Attendance System
OU = Development
L = Taipei
ST = Taiwan
C = TW

[v3_req]
basicConstraints = CA:FALSE
keyUsage = keyEncipherment, dataEncipherment
subjectAltName = @alt_names

[alt_names]
DNS.1 = localhost
DNS.2 = *.localhost
IP.1 = 127.0.0.1
IP.2 = ::1
IP.3 = 0.0.0.0
IP.4 = 192.168.1.149
IP.5 = 192.168.0.1
IP.6 = 192.168.1.1
IP.7 = 10.0.0.1