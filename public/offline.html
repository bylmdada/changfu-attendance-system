<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>離線模式 - 長福考勤系統</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .container {
        background: white;
        border-radius: 20px;
        padding: 40px;
        text-align: center;
        max-width: 400px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .icon {
        font-size: 64px;
        margin-bottom: 20px;
      }
      h1 {
        color: #1f2937;
        font-size: 24px;
        margin-bottom: 12px;
      }
      p {
        color: #6b7280;
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 24px;
      }
      button {
        background: #2563eb;
        color: white;
        border: none;
        padding: 12px 32px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover {
        background: #1d4ed8;
      }
      .tips {
        margin-top: 24px;
        padding-top: 20px;
        border-top: 1px solid #e5e7eb;
        text-align: left;
      }
      .tips h3 {
        font-size: 14px;
        color: #374151;
        margin-bottom: 8px;
      }
      .tips ul {
        font-size: 14px;
        color: #6b7280;
        padding-left: 20px;
      }
      .tips li {
        margin-bottom: 4px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="icon">📡</div>
      <h1>目前處於離線模式</h1>
      <p>無法連接到伺服器，請檢查您的網路連線後重試。</p>
      <button onclick="location.reload()">重新連線</button>

      <div class="tips">
        <h3>可嘗試以下方法：</h3>
        <ul>
          <li>檢查 WiFi 或行動網路是否開啟</li>
          <li>嘗試切換到其他網路</li>
          <li>稍後再試</li>
        </ul>
      </div>
    </div>
  </body>
</html>
